spring:
  application:
    name: apex-f1-api

  # Docker 설정
  docker:
    compose:
      enabled: false

  # DB 연결 설정 - Multi Datasource
  datasource:
    # 1. 메인 비즈니스
    main:
      jdbc-url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
      username: ${MAIN_POSTGRES_USERNAME}
      password: ${MAIN_POSTGRES_PASSWORD}
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: MainHikariPool
        maximum-pool-size: 10

    # 2. ApexAI 전용 Read-Only DataSource
    apexai-readonly:
      jdbc-url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
      username: ${APEXAI_POSTGRES_USERNAME}
      password: ${APEXAI_POSTGRES_PASSWORD}
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: ApexAiReadOnlyPool
        maximum-pool-size: 5

  # JPA 설정 (Hibernate)
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  # Spring AI (OpenAI + Vector Store) 설정
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        table-name: vector_store
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        initialize-schema: true

  # Local Redis 설정
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  # Kafka 설정
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: true # 리스너 자동 실행 방지

jwt:
  # ENV로 변경 필요
  secret: "ApexFormulaOneSecretKeyForJwtAuthenticationMustBeLongerThan32Bytes"
  access-token-expiration: 1800000 # 30분 (밀리초)
  refresh-token-expiration: 1209600000 # 14일 (밀리초)

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}