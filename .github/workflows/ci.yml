name: Apex F1 API CI Pipeline

on:
  push:
    branches: [ "main", "APEX-*", "feat/APEX-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕️ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🛠️ Build and Test with Gradle
        run: ./gradlew build