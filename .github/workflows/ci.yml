# 1. 깃허브 액션 탭에서 보일 워크플로우의 이름입니다.
name: Apex F1 API CI Pipeline

# 2. 언제 이 로봇을 작동시킬 것인가? (Trigger)
on:
  push:
    branches: [ "main", "APEX-*" ] # main이나 APEX- 로 시작하는 브랜치에 push 될 때
  pull_request:
    branches: [ "main" ] # main 브랜치로 PR이 올라올 때

# 3. 로봇이 할 일들 (Jobs)
jobs:
  build-and-test:
    # 깃허브가 빌려주는 최신 우분투(Linux) 컴퓨터 한 대를 켭니다.
    runs-on: ubuntu-latest

    steps:
      # Step 1: 깃허브 저장소에 있는 우리 코드를 우분투 컴퓨터로 다운로드(Checkout) 받습니다.
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # Step 2: 우분투 컴퓨터에는 자바가 없으니, 우리가 쓰는 Corretto 17 버전을 설치해 줍니다.
      - name: ☕️ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      # Step 3: Gradle 빌드 속도를 엄청나게 빠르게 만들어주는 캐시(Cache) 설정입니다. (실무 필수 꿀팁!)
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Step 4: gradlew 실행 파일에 권한을 줍니다. (맥/리눅스 환경 차이 방지)
      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 5: 드디어 대망의 테스트 및 빌드!
      # (우리가 작성한 통합/단위 테스트가 여기서 쫙 돌아갑니다. 하나라도 실패하면 로봇이 빨간불(X)을 띄웁니다.)
      - name: 🛠️ Build and Test with Gradle
        run: ./gradlew build