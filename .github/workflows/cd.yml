name: Apex F1 API CD Pipeline

on:
  workflow_run:
    workflows: ["Apex F1 API CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # [단계 1] JDK 설정 및 Gradle 빌드 (최신 .jar 파일 생성)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # 테스트를 제외하고 clean 빌드를 수행하여 항상 최신 .jar를 생성합니다.
        run: ./gradlew clean bootJar -x test

      # [단계 2] Docker Buildx 설정 (캐싱 지원)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # [단계 3] 최신 .jar 파일을 포함하여 도커 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/apex-f1-api:latest
            ghcr.io/${{ github.repository_owner }}/apex-f1-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    name: Deploy to EC2
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: ENV_FILE_CONTENT
          script: |
            echo "[*] 백엔드 서버 배포를 시작합니다..."
            cd ~/apex-f1-api

            git fetch --all
            git reset --hard origin/main
            
            echo "[*] .env 파일 생성 중..."
            echo "$ENV_FILE_CONTENT" > .env

            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "[*] 최신 이미지를 Pull 받습니다..."
            docker pull ghcr.io/${{ github.repository_owner }}/apex-f1-api:latest

            echo "[*] 도커 컨테이너를 다시 실행합니다..."
            docker compose --env-file .env -f .docker/docker-compose.yml -f .docker/docker-compose.override.yml up -d

            docker image prune -f
            echo "[*] 백엔드 서버 자동 배포가 완료되었습니다 :)"