name: Apex F1 API CD Pipeline

on:
  workflow_run:
    workflows: ["Apex F1 API CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # [최적화 1] Gradle 의존성 캐싱
      # ~/.gradle 폴더를 자동으로 저장, 복원하여 라이브러리 다운로드 시간을 제거
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # [최적화 2] Docker 레이어 캐싱 (GHA 전용)
      # 빌드된 각 레이어를 GitHub Actions 내부 저장소에 저장
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/apex-f1-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    name: Deploy to EC2
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: ENV_FILE_CONTENT
          script: |
            echo "[*] 배포를 시작합니다..."
            cd ~/apex-f1-api

            git fetch --all
            git reset --hard origin/main
            
            echo "[*] .env 파일 생성 중..."
            echo "$ENV_FILE_CONTENT" > .env

            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "[*] 최신 이미지를 Pull 받습니다..."
            docker pull ghcr.io/${{ github.repository_owner }}/apex-f1-api:latest

            echo "[*] 도커 컨테이너를 다시 실행합니다..."
            docker compose --env-file .env -f .docker/docker-compose.yml -f .docker/docker-compose.override.yml up -d

            docker image prune -f
            echo "[*] 백엔드 서버 자동 배포가 완료되었습니다 :)"