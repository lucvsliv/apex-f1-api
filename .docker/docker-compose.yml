services:
  # 1. Database (PGVector)
  apex-f1-postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${MAIN_POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${MAIN_POSTGRES_PASSWORD}

  # 2. Cache & Rate Limiter
  apex-f1-redis:
    image: redis:alpine
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. Message Broker (Kafka - KRaft Mode)
  apex-f1-kafka:
    image: bitnami/kafka:latest
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@apex-f1-kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # 도커 네트워크 내부(apex-f1-api)와 호스트 머신 모두에서 접속 가능하도록 설정
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://apex-f1-kafka:9092
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Backend API
  apex-f1-api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    environment:
      # Multi-Datasource DB URL
      SPRING_DATASOURCE_MAIN_JDBC_URL: jdbc:postgresql://apex-f1-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_APEXAI_READONLY_JDBC_URL: jdbc:postgresql://apex-f1-postgres:5432/${POSTGRES_DB}
      
      # DB Credentials
      POSTGRES_DB: ${POSTGRES_DB}
      MAIN_POSTGRES_USERNAME: ${MAIN_POSTGRES_USERNAME}
      MAIN_POSTGRES_PASSWORD: ${MAIN_POSTGRES_PASSWORD}
      APEXAI_POSTGRES_USERNAME: ${APEXAI_POSTGRES_USERNAME}
      APEXAI_POSTGRES_PASSWORD: ${APEXAI_POSTGRES_PASSWORD}

      # Redis 연결 정보
      SPRING_DATA_REDIS_HOST: apex-f1-redis
      SPRING_DATA_REDIS_PORT: 6379

      # API Keys & CORS
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      apex-f1-postgres:
        condition: service_started
      apex-f1-redis:
        condition: service_healthy